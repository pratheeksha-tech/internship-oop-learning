<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD App</title>
</head>
<body>

    <h1>Student List</h1>

    <a href="/add">Add Student</a>

    <ul>
        {% for s in students %}
        <li>
            {{ s.name }} - {{ s.course }}

            <a href="/edit/{{ s.id }}">Edit</a>
            <a href="/delete/{{ s.id }}">Delete</a>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
